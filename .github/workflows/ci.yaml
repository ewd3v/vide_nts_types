name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

defaults:
  run:
    shell: bash

jobs:
  format:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pesde
        uses: ewd3v/setup-pesde@v0.1.1

      - name: Check formatting
        run: pesde run format_check

  analyze:
    name: Analyze and lint Luau files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pesde
        uses: ewd3v/setup-pesde@v0.1.1

      - name: Analyze
        run: pesde run analyze
